<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Parfume</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
color:white;
overflow-x:hidden;
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('https://i.ibb.co.com/7xTp6hb8/botol11.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HERO */
.hero{text-align:center;padding:60px;}
.hero h1{font-size:50px;color:gold;text-shadow:0 0 20px gold;}
.hero p{opacity:.8}

/* SEARCH */
.search-box input{
width:60%;padding:15px;border-radius:40px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
color:white;margin-top:20px;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;padding:40px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:25px;padding:20px;text-align:center;
border:1px solid rgba(255,255,255,0.2);
box-shadow:0 8px 32px rgba(0,0,0,0.5);
transition:.3s;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(255,215,0,0.5);
}

.card img{width:100%;border-radius:15px;}
.price{color:gold;}

/* BUTTON */
.btn{
margin-top:10px;padding:10px 20px;
border:none;border-radius:20px;
background:linear-gradient(45deg,gold,orange);
color:black;font-weight:bold;cursor:pointer;
transition:.3s;
}
.btn:hover{transform:scale(1.1);}

/* FOOTER */
.footer{
margin:40px;padding:20px;border-radius:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
display:flex;justify-content:space-around;
border:1px solid rgba(255,255,255,0.1);
}

/* CHAT */
.chat{
position:fixed;right:20px;bottom:20px;
background:gold;color:black;
padding:15px 25px;border-radius:30px;
cursor:pointer;
box-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<div class="hero">
<h1>Star Parfume</h1>
<p>Temukan parfum terbaik untuk setiap momen spesialmu</p>

<div class="search-box">
<input type="text" id="search" placeholder="Cari parfum...">
</div>
</div>

<div class="products">

<div class="card" data-name="strong with you">
<img src="https://i.ibb.co.com/7xTp6hb8/botol11.png">
<h3>Strong With You</h3>
<p class="price">Rp30.000</p>
<button class="btn" onclick="orderWA('Strong With You',30000)">Order</button>
</div>

<div class="card" data-name="aigner black">
<img src="https://i.ibb.co.com/7xTp6hb8/botol11.png">
<h3>Aigner Black</h3>
<p class="price">Rp30.000</p>
<button class="btn" onclick="orderWA('Aigner Black',30000)">Order</button>
</div>

<div class="card" data-name="bulgary aqua">
<img src="https://i.ibb.co.com/7xTp6hb8/botol11.png">
<h3>Bulgary Aqua</h3>
<p class="price">Rp30.000</p>
<button class="btn" onclick="orderWA('Bulgary Aqua',30000)">Order</button>
</div>

<div class="card" data-name="paul smith">
<img src="https://i.ibb.co.com/7xTp6hb8/botol11.png">
<h3>Paul Smith</h3>
<p class="price">Rp20.000</p>
<button class="btn" onclick="orderWA('Paul Smith',20000)">Order</button>
</div>

</div>

<div class="footer">
<div>✔ 100% Original</div>
<div>🚚 Pengiriman Cepat</div>
<div>📞 24 Jam</div>
</div>

<div class="chat" onclick="chatWA()">Chat Admin</div>

<script>
const nomorWA = "6282124028857"; // sudah otomatis dari 0821

function orderWA(nama,harga){
let jumlah = prompt("Masukkan jumlah pesanan:");
if(!jumlah || isNaN(jumlah) || jumlah<=0){
alert("Masukkan jumlah valid!");
return;
}
let total = harga * jumlah;

let pesan = `Halo kak 👋
Saya ingin order:

🧴 ${nama}
📦 Jumlah: ${jumlah}
💰 Total: Rp${total.toLocaleString()}

Mohon info ya 🙏`;

window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`,"_blank");
}

function chatWA(){
let pesan = "Halo kak, saya mau tanya tentang parfum";
window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`,"_blank");
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
let v=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.getAttribute("data-name").includes(v)?"block":"none";
});
});
</script>

</body>
</html>
